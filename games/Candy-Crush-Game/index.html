<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <!-- Tambahan meta viewport agar skala layar HP menyesuaikan dengan benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twidy Break Room - Candy Crush</title>

    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400&display=swap" rel="stylesheet">
    <script src="script.js" charset="utf-8" defer></script>
  </head>
  <body>
    <!-- Mode Selection Screen -->
    <div id="modeSelection">
      <h2>Choose Game Mode</h2>
      <button id="endlessMode">Endless Mode</button>
      <button id="timedMode">Timed Mode</button>
    </div>
    
    <!-- Wrapper untuk game agar posisinya rapi di tengah layar -->
    <div class="game-container">
        <!-- Scoreboard with Timer and Change Mode Button -->
        <div class="scoreBoard">
          <div class="score-info">
              <h3>Score</h3>
              <h1 id="score">0</h1>
          </div>
          <div id="timer"></div>
          <button id="changeMode">Change Mode</button>
        </div>
        
        <!-- Game Grid -->
        <div class="grid"></div>
    </div>
  </body>
</html>
